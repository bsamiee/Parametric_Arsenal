name: Weekly Pre-Commit Autoupdate

on:
    schedule:
        # Every Monday at 08:00 UTC
        - cron: "0 8 * * MON"
    workflow_dispatch: # allows you to trigger it manually

permissions:
    contents: write # needed to push the update commit

jobs:
    autoupdate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # we need history to create a commit

            - name: Set Git author
              run: |
                  git config --global user.name  "${{ secrets.RELEASE_AUTHOR_NAME }}"
                  git config --global user.email "${{ secrets.RELEASE_AUTHOR_EMAIL }}"

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install pre-commit
              run: python -m pip install --upgrade pre-commit

            - name: Run pre-commit autoupdate
              run: pre-commit autoupdate

            - name: Commit and push updated hook versions
              run: |
                  if git diff --quiet; then
                    echo "No hook revisions to update."
                  else
                    git add .pre-commit-config.yaml
                    git commit -m "chore: pre-commit autoupdate"
                    git push
                  fi
