name: Release

on:
    push:
        branches:
            - master

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            # --- checkout full history so semantic-release can see all tags
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # --- toolchain ---------------------------------------------------------
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Cache pip, Poetry & Nox envs
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/pypoetry
                      .cache/nox
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      nox-${{ runner.os }}-

            - name: Install Poetry 2.1.1
              run: pip install --upgrade "poetry==2.1.1"

            - name: Install Nox
              run: pip install --upgrade nox

            # --- single test pass --------------------------------------------------
            - name: Run test suite
              run: nox -s tests

            # --- version bump • changelog • GitHub Release -------------------------
            - name: Run semantic-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # token for pushing tags / releases
                  GIT_COMMIT_AUTHOR: ${{ secrets.GIT_COMMIT_AUTHOR }} # "Name <email>"
              run: nox -s release
