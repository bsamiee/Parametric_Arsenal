# .github/workflows/release.yml
name: Create and Publish Release

on:
    push:
        branches: ["master"]
    workflow_dispatch: {} # Allows you to run this workflow manually from the Actions tab

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Required to push tags and create releases
        steps:
            # 1. Checkout repository with full history
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Required for semantic-release to analyze history
                  fetch-tags: true # fetch *all* tags
                  ref: master
                  persist-credentials: false

            # 2. Install git-cliff for changelog generation
            - name: Install git-cliff
              run: |
                  # Pinning to a specific version for reproducible builds
                  CLIFF_VERSION="2.2.2"

                  # Download the release tarball from GitHub
                  curl -L "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" --output git-cliff.tar.gz

                  # Extract the tarball
                  tar -xf git-cliff.tar.gz

                  # Move the git-cliff binary to a directory in the system's PATH
                  sudo mv git-cliff /usr/local/bin/

                  # Verify the installation and print the version
                  echo "Successfully installed git-cliff version:"
                  git-cliff --version

            # 3. Set up Python 3.13
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            # 4. Install Poetry
            - name: Install Poetry
              uses: snok/install-poetry@v1
              with:
                  # Pinning poetry version for consistency
                  version: "1.8.2" # Note: 2.1.1 is not a valid version for this action, using a recent stable version.

            # 5. Set up dependency cache for faster installs
            - name: Set up dependency cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pypoetry/virtualenvs
                  key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      poetry-${{ runner.os }}-

            # 6. Configure git user
            - name: Configure git user
              run: |
                  git config --global user.name  "Bardia Samiee"
                  git config --global user.email "b.samiee93@gmail.com"

            # 7. Install project dependencies
            - name: Install dependencies
              run: poetry install --no-interaction

            # 8. Execute the release process
            - name: Perform release
              env:
                  # The GITHUB_TOKEN is provided by GitHub Actions
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: poetry run semantic-release publish
