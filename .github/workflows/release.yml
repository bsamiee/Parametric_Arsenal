# .github/workflows/release.yml
name: Create and Publish Release

on:
    push: # automatic on every push to master
        branches: [master]
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # allow tag + CHANGELOG commit
            packages: write # allow publishing to PyPI

        steps:
            # 1 - full history so PSR can see every tag / commit
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  ref: master

            # 2 - Python first (cache plain pip wheels, not Poetry yet)
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            # 3 - Install exact Poetry version
            - name: Install Poetry 2.1.1
              uses: snok/install-poetry@v1
              with:
                  version: "2.1.1"
                  virtualenvs-create: true
                  virtualenvs-in-project: true # keeps .venv in repo root

            # 4 - Optional: reuse Poetry's venv cache
            - name: Poetry venv cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pypoetry/virtualenvs
                  key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      poetry-${{ runner.os }}-

            # 5 - Configure git author (needed for PSR commit)
            - name: Configure git user
              run: |
                  git config --global user.name  "Bardia Samiee"
                  git config --global user.email "b.samiee93@gmail.com"

            # 6 - Install ALL deps, including dev, in one shot
            - name: Install dependencies
              run: |
                  poetry install --no-interaction --only main,dev
                  poetry --version

            # 7 - Run the release (version bump, tag, changelog, GH Release)
            - name: Perform release
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  GIT_COMMIT_AUTHOR: "Bardia Samiee <b.samiee93@gmail.com>"
                  LOG_LEVEL: DEBUG
              run: |
                  # Directly call the executable to avoid potential issues with `poetry run` in CI
                  $(poetry env info --path)/bin/semantic-release publish
