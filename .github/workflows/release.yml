# .github/workflows/release.yml
name: Release
on:
    push:
        branches: [master]
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # allow tag+commit
            packages: write # if you ever upload wheels
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # get full history & tags
                  fetch-tags: true # fetch *all* tags
                  ref: master

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "poetry"

            - name: Install Poetry + deps
              run: |
                  pip install poetry
                  poetry install --no-interaction --with dev
                  poetry run poetry --version

            - name: Perform release (version, tag, changelog, GH Release)
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GIT_COMMIT_AUTHOR: "Bardia Samiee <b.samiee93@gmail.com>"
              run: |
                  poetry run semantic-release publish --log-level=DEBUG
