# .github/workflows/release.yml
name: Create and Publish Release

on:
    push:
        branches: [master]
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # needed to push commits and tags
            id-token: write # needed for authentication

        steps:
            - name: "Checkout code"
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_TOKEN }}

            - name: "Set up Python"
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: "Install Poetry"
              uses: snok/install-poetry@v1
              with:
                  version: "2.1.1"
                  virtualenvs-create: true
                  virtualenvs-in-project: true

            - name: "Cache Poetry virtualenv"
              uses: actions/cache@v4
              with:
                  path: .venv
                  key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      poetry-${{ runner.os }}-

            - name: "Install dependencies"
              run: poetry install --no-interaction

            - name: "Check if release is needed"
              id: check_release
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                  set -x
                  # Check if there are any commits that would trigger a release
                  if poetry run semantic-release version --print | grep -q '^[0-9]'; then
                    echo "release_needed=true" >> $GITHUB_OUTPUT
                    echo "Release is needed"
                  else
                    echo "release_needed=false" >> $GITHUB_OUTPUT
                    echo "No release needed"
                  fi

            - name: "Run semantic-release"
              if: steps.check_release.outputs.release_needed == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: |
                  set -x
                  echo "Running PSR to bump version and create tag..."
                  poetry run semantic-release publish

            - name: "Get current version"
              if: steps.check_release.outputs.release_needed == 'true'
              id: get_version
              run: |
                  set -x
                  VERSION=$(poetry version --short)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Current version after PSR: $VERSION"

            - name: "Generate enhanced changelog with git-cliff"
              if: steps.check_release.outputs.release_needed == 'true'
              run: |
                  set -x
                  echo "Generating enhanced changelog with git-cliff..."

                  # Create CHANGELOG.md if it doesn't exist
                  if [ ! -f CHANGELOG.md ]; then
                    echo "CHANGELOG.md not found, creating it..."
                    cat > CHANGELOG.md << 'EOF'
                  # Changelog

                  All notable changes to this project will be documented in this file.
                  The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
                  and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

                  <!-- generated by git-cliff -->
                  EOF
                  fi

                  # Generate the full changelog and replace the existing file
                  poetry run git-cliff -vv --tag v${{ steps.get_version.outputs.version }} --output CHANGELOG.md

            - name: "Commit enhanced changelog"
              if: steps.check_release.outputs.release_needed == 'true'
              run: |
                  set -x
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  # Check if changelog was actually modified
                  if ! git diff --quiet CHANGELOG.md; then
                    echo "Changelog was modified, committing changes..."
                    git add CHANGELOG.md
                    git commit -m "docs: enhance changelog for v${{ steps.get_version.outputs.version }}"
                    git push origin master
                  else
                    echo "No changelog changes detected"
                  fi

            - name: "Debug: Show final state"
              if: steps.check_release.outputs.release_needed == 'true'
              run: |
                  set -x
                  echo "=== Final Debug Information ==="
                  echo "Current version: $(poetry version --short)"
                  echo "Latest git tag: $(git describe --tags --abbrev=0 2>/dev/null || echo 'No tags found')"
                  echo "Last 5 commits:"
                  git log --oneline -5
                  echo "Git status:"
                  git status
