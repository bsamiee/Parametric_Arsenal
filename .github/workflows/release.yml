# .github/workflows/release.yml
name: Create and Publish Release

on:
    push:
        branches: ["master"]
    workflow_dispatch: {} # Allows you to run this workflow manually from the Actions tab

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Required to push tags and create releases
        steps:
            # 1. Checkout repository with full history
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Required for semantic-release to analyze history
                  fetch-tags: true # ← fetch *all* tags
                  ref: master # (optional) make sure we are on master
                  persist-credentials: false

            # 2. Install git-cliff for changelog generation
            - name: Install git-cliff
              run: |
                  sudo apt-get update
                  sudo apt-get install -y git-cliff

            # 3. Set up Python 3.13
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            # 4. Install Poetry 2.1.1
            - name: Install Poetry
              uses: snok/install-poetry@v1
              with:
                  version: "2.1.1"

            # 5. Set up dependency cache for faster installs
            - name: Set up dependency cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pypoetry/virtualenvs
                  key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      poetry-${{ runner.os }}-

            # 6 bis. Configure git user (optional, avoids tag-author warnings)
            - name: Configure git user
              run: |
                  git config --global user.name  "Bardia Samiee"
                  git config --global user.email "b.samiee93@gmail.com"

            # 7. Install project dependencies
            - name: Install dependencies
              run: poetry install --no-interaction

            # 8. Execute the release process
            - name: Perform release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GIT_COMMIT_AUTHOR: "Bardia Samiee <b.samiee93@gmail.com>"
              run: poetry run semantic-release publish
