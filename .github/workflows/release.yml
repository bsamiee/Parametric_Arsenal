# .github/workflows/release.yml
name: Create and Publish Release

on:
    push:
        branches:
            - master # release from the protected default branch

permissions:
    contents: write # allow tag + GitHub Release upload

jobs:
    # ────────────────────────────────────────
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - uses: snok/install-poetry@v1
              with:
                  version: 1.8.2

            - uses: actions/cache@v4
              with:
                  path: |
                      .cache/nox
                      ~/.cache/pip
                      ~/.cache/pypoetry
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

            - name: Install Nox
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install nox

            - name: Run tests
              env:
                  PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
              run: nox -s tests

    # ────────────────────────────────────────
    release:
        needs: test # only publish if the suite passed
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # full history for semantic-release

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - uses: snok/install-poetry@v1
              with:
                  version: 1.8.2

            - uses: actions/cache@v4
              with:
                  path: |
                      .cache/nox
                      ~/.cache/pip
                      ~/.cache/pypoetry
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

            - name: Install Nox
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install nox

            - name: Semantic Release
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
              run: nox -s release
