name: Release

on:
    push:
        branches:
            - master

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # semantic-release needs full history

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Cache pip, Poetry & Nox envs
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/pypoetry
                      .cache/nox
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      nox-${{ runner.os }}-

            - name: Install Poetry 2.1.1
              run: pip install --upgrade "poetry==2.1.1"

            - name: Install Nox
              run: pip install --upgrade nox

            # ---------- single test pass ----------
            - name: Run test suite
              run: nox -s tests

            # ---------- version bump, changelog, release ----------
            - name: Run semantic-release
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: nox -s release
