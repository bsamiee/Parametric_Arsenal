name: CI

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    workflow_dispatch:

jobs:
    qa:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python 3.13
              uses: actions/setup-python@v5
              with:
                  python-version: '3.13'

            - name: Cache pip, Poetry, Nox, and pre-commit
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/pypoetry
                      .cache/nox
                      .cache/pre-commit
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      nox-${{ runner.os }}-

            - name: Install Poetry
              run: pip install --upgrade "poetry>=2.1.1"

            - name: Install Nox
              run: pip install --upgrade "nox==2025.5.1" # Pinned to match project

            - name: Run lint, type-check, and QA sessions
              run: |
                  # Run all quality checks except tests
                  nox -s lint mypy code_quality

            - name: Run safety check
              run: |
                  # Explicitly run safety check for dependency vulnerabilities
                  poetry run safety check --full-report

            - name: Run tests with coverage (if present)
              run: |
                  # Run tests session separately - it will be skipped if no test files exist
                  nox -s tests -- --cov=libs --cov-report=xml

            - name: Upload coverage report
              uses: codecov/codecov-action@v3
              with:
                  files: ./coverage.xml
                  fail_ci_if_error: false
