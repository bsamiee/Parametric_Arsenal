# .github/workflows/ci.yml
name: Continuous Integration

on:
    pull_request:
        branches: ["master"]

permissions:
    contents: read

jobs:
    qa:
        runs-on: ubuntu-latest

        steps:
            # 1 - Checkout
            - uses: actions/checkout@v4

            # 2 - Python toolchain
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            # 3 - Install Poetry once (outside Nox virtualenvs)
            - uses: snok/install-poetry@v1
              with:
                  version: 1.8.2 # keep in sync with your local version

            # 4 - Cache: finished Nox venvs + Poetry & pip wheels
            - uses: actions/cache@v4
              with:
                  path: |
                      .cache/nox
                      ~/.cache/pip
                      ~/.cache/pypoetry
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

            # 5 - Install Nox itself
            - name: Install Nox
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install nox

            # 6 - Run lint, MyPy, pre-commit, and test sessions
            - name: Run Nox QA suite
              env:
                  PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
              run: nox -s lint mypy pre_commit tests
