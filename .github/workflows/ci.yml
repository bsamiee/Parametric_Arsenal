# .github/workflows/ci.yml
name: Continuous Integration

on:
    pull_request:
        branches: ["master"]

permissions:
    contents: read

jobs:
    qa:
        runs-on: ubuntu-latest

        steps:
            # 1 - Checkout
            - uses: actions/checkout@v4

            # 2 - Python
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            # 3 - Poetry 2.1.1 (system-wide, once per job)
            - uses: snok/install-poetry@v1
              with:
                  version: "2.1.1"

            # 4 - Show the Poetry version (diagnostic)
            - run: poetry --version

            # 5 - Cache ready-made Nox envs + wheels
            - uses: actions/cache@v4
              with:
                  path: |
                      .cache/nox
                      ~/.cache/pip
                      ~/.cache/pypoetry
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

            # 6 - Install Nox
            - run: |
                  python -m pip install --upgrade pip
                  python -m pip install nox

            # 7 - Run the QA matrix
            - name: Run Nox QA suite
              env:
                  PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
              run: nox -s lint mypy pre_commit tests
