name: CI

on:
    pull_request:
    push:
        branches-ignore:
            - master # master is handled by release.yml

jobs:
    qa:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Cache pip, Poetry & Nox envs
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/pypoetry
                      .cache/nox
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      nox-${{ runner.os }}-

            - name: Install Poetry 2.1.1
              run: pip install --upgrade "poetry==2.1.1"

            - name: Install Nox
              run: pip install --upgrade nox # <-- not pinned

            - name: Run QA suite
              run: |
                  nox -s lint mypy pre_commit tests
