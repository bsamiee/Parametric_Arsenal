name: CI

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    workflow_dispatch:

jobs:
    qa:
        runs-on: ubuntu-latest
        # Skip CI on automated commits to avoid conflicts with release workflow
        if: |
            github.actor != 'github-actions[bot]' &&
            !contains(github.event.head_commit.message, '[skip ci]') &&
            !contains(github.event.head_commit.message, 'bump: release')

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python 3.13
              uses: actions/setup-python@v5
              with:
                  python-version: '3.13'

            - name: Cache pip, Poetry, Nox, and pre-commit
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/pypoetry
                      .cache/nox
                      .cache/pre-commit
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      nox-${{ runner.os }}-

            - name: Install Poetry 2.1.1
              run: pip install --upgrade "poetry==2.1.1"

            - name: Install Nox
              run: pip install --upgrade "nox==2025.5.1" # Pinned to match project

            - name: Run lint, type-check, and QA sessions
              run: |
                  # Run all quality checks except tests (which are conditionally skipped if no tests exist)
                  nox -s lint mypy code_quality

            - name: Run tests (if present)
              run: |
                  # Run tests session separately - it will be skipped if no test files exist
                  nox -s tests
