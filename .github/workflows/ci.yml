name: CI

on:
    pull_request:
        branches:
            - master

jobs:
    qa:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python 3.13
              uses: actions/setup-python@v5
              with:
                  python-version: '3.13'

            - name: Cache pip, Poetry, Nox, and pre-commit
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/pypoetry
                      .cache/nox
                      .cache/pre-commit
                  key: nox-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: |
                      nox-${{ runner.os }}-

            - name: Install Poetry 2.1.1
              run: pip install --upgrade "poetry==2.1.1"

            - name: Install Nox
              run: pip install --upgrade "nox==2025.5.1" # Pinned to match project

            - name: Run lint
              run: nox -s lint

            - name: Run type-check (mypy)
              run: nox -s mypy

            - name: Run code quality checks
              run: nox -s code_quality

            - name: Run tests (if present)
              run: |
                  # Run tests session separately - it will be skipped if no test files exist
                  nox -s tests
