# .pre-commit-config.yaml
ci:
    autoupdate_schedule: 'weekly'
    skip_commits:
        # Skip pre-commit for CI/bot commits
        message: >-
            .*[\[skip ci\]].*|
            .*github-actions[bot].*

default_stages: [pre-commit]
default_language_version:
    python: python3.13

repos:
    # --- Formatters first ------------------------------------------------------
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.12.0
      hooks:
          - id: ruff
            name: ruff (autofix and format)
            args: [--fix, --exit-non-zero-on-fix]
            types: [python]
            files: \.py$
          # Consolidated ruff-format into ruff hook for efficiency
          # - id: ruff-format
          #   types: [python]
          #   files: \.py$
    - repo: https://github.com/PyCQA/docformatter
      rev: v1.7.7
      hooks:
          - id: docformatter
            args:
                [
                    --in-place,
                    --recursive,
                    --wrap-summaries=120,
                    --wrap-descriptions=120,
                    --pre-summary-newline,
                    --force-wrap,
                ]
            types: [python]
            files: \.py$
    - repo: https://github.com/asottile/pyupgrade
      rev: v3.20.0
      hooks:
          - id: pyupgrade
            types: [python]
            files: \.py$
    - repo: https://github.com/pappasam/toml-sort
      rev: v0.24.2
      hooks:
          - id: toml-sort
            args: [--in-place]
            files: ^pyproject\.toml$
    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v4.0.0-alpha.8
      hooks:
          - id: prettier
            files: \.(json|yaml|yml|md)$
            exclude: '^(CHANGELOG\.md|\.cache/.*|node_modules/.*)$'
            types: [json, yaml, markdown]
            description: Formats JSON, YAML, and Markdown files (excludes auto-generated CHANGELOG and cache directories)
    # - repo: https://github.com/jorisroovers/shfmt
    #   rev: v3.7.0
    #   hooks:
    #       - id: shfmt
    #         args: ['-i', '4', '-ci', '-bn', '-sr', '-s', '-ln', 'bash']
    #         files: \.sh$
    # Temporarily removed shfmt hook due to unavailable pre-commit repo

    # --- Linters/checkers -----------------------------------------------------
    - repo: https://github.com/igorshubovych/markdownlint-cli
      rev: v0.45.0
      hooks:
          - id: markdownlint
            args: [--config, .markdownlint.json]
            files: \.md$
            exclude: '^(CHANGELOG\.md|\.cache/.*|node_modules/.*)$'
            description: Validates Markdown files after prettier formatting (excludes auto-generated CHANGELOG and cache directories)
    # - repo: https://github.com/Julian/jsonlint
    #   rev: v0.1
    #   hooks:
    #       - id: jsonlint
    #         args: []
    #         files: \.json$
    #         description: Validates JSON files after prettier formatting
    # Temporarily removed jsonlint hook due to unavailable pre-commit repo
    - repo: https://github.com/adrienverge/yamllint
      rev: v1.37.1
      hooks:
          - id: yamllint
            types: [yaml]
            files: \.yml|yaml$
            exclude: '^(\.cache/.*|node_modules/.*)$'
            description: Validates YAML files for correctness (excludes cache directories)
    - repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.10.0.1
      hooks:
          - id: shellcheck
            types: [shell]
            files: \.sh$
    - repo: https://github.com/jendrikseipp/vulture
      rev: v2.14
      hooks:
          - id: vulture
            args:
                - '--min-confidence'
                - '80'
                - 'libs/'
            types: [python]
            files: ^libs/.*\.py$
    - repo: https://github.com/Yelp/detect-secrets
      rev: v1.5.0
      hooks:
          - id: detect-secrets
            args:
                - '--baseline'
                - '.secrets.baseline'
            exclude: 'poetry.lock'
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.16.1
      hooks:
          - id: mypy
            additional_dependencies: ['pydantic', 'sqlalchemy']
            types: [python]
            files: \.py$
            stages: [manual] # Only run when explicitly called
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-yaml
            types: [yaml]
            files: \.yml|yaml$
            exclude: 'CHANGELOG\.md'
          - id: check-toml
            files: ^pyproject\.toml$
            exclude: 'CHANGELOG\.md'
          - id: end-of-file-fixer
            exclude: 'CHANGELOG\.md'
          - id: trailing-whitespace
            exclude: 'CHANGELOG\.md'
          - id: check-added-large-files
            args: ['--maxkb=512']
            exclude: 'CHANGELOG\.md'
          - id: check-ast
            types: [python]
            files: \.py$
            exclude: 'CHANGELOG\.md'
          - id: check-case-conflict
            exclude: 'CHANGELOG\.md'
          - id: check-docstring-first
            types: [python]
            files: \.py$
            exclude: 'CHANGELOG\.md'
          - id: check-executables-have-shebangs
            exclude: 'CHANGELOG\.md'
          - id: check-illegal-windows-names
            exclude: 'CHANGELOG\.md'
          - id: check-json
            types: [json]
            files: \.json$
            exclude: 'CHANGELOG\.md'
          - id: check-shebang-scripts-are-executable
            exclude: 'CHANGELOG\.md'
          - id: check-symlinks
            exclude: 'CHANGELOG\.md'
          - id: check-xml
            types: [xml]
            files: \.xml$
            exclude: 'CHANGELOG\.md'
          - id: destroyed-symlinks
            exclude: 'CHANGELOG\.md'
          - id: detect-private-key
            exclude: 'CHANGELOG\.md'
          - id: name-tests-test
            types: [python]
            files: ^tests/.*\.py$
            exclude: 'CHANGELOG\.md'
          - id: pretty-format-json
            args: [--autofix, --indent=4, --no-ensure-ascii, --no-sort-keys]
            types: [json]
            files: \.json$
            exclude: 'CHANGELOG\.md'
          # Removed sort-simple-yaml as prettier now handles comprehensive YAML formatting
          # - id: sort-simple-yaml
          #   types: [yaml]
          #   files: \.yml|yaml$
          - id: check-merge-conflict
            exclude: 'CHANGELOG\.md'

    # --- Local helpers ----------------------------------------------------------
    - repo: local
      hooks:
          - id: update-python-headers
            name: Update Python script headers
            entry: .tools/scripts/quality/update_header.py
            language: python
            types: [python]
            additional_dependencies: [jinja2]
            stages: [manual] # Only run when explicitly called
