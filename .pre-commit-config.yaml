# .pre-commit-config.yaml
repos:
    # --- Core ------------------------------------------------------------------
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-yaml
          - id: check-toml
          - id: end-of-file-fixer
          - id: trailing-whitespace
          - id: check-added-large-files
            args: ["--maxkb=512"] # warn on files > 512 KB (default 500 KB)
          - id: check-ast
          - id: check-case-conflict
          - id: check-docstring-first
          - id: check-executables-have-shebangs
          - id: check-illegal-windows-names
          - id: check-json
          - id: check-shebang-scripts-are-executable
          - id: check-symlinks
          - id: check-xml
          - id: destroyed-symlinks
          - id: detect-private-key
          - id: double-quote-string-fixer
          - id: name-tests-test
          - id: pretty-format-json
            args: [--autofix, --indent=4, --no-ensure-ascii, --no-sort-keys]
          - id: sort-simple-yaml

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.11.13
      hooks:
          - id: ruff
            args: [--fix, --exit-non-zero-on-fix]
          - id: ruff-format

    - repo: https://github.com/executablebooks/mdformat
      rev: 0.7.22
      hooks:
          - id: mdformat
            additional_dependencies: [mdformat-frontmatter]

    - repo: https://github.com/adrienverge/yamllint
      rev: v1.37.1
      hooks:
          - id: yamllint

    - repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.10.0.1
      hooks:
          - id: shellcheck

    # --- Local helpers ----------------------------------------------------------
    - repo: local
      hooks:
          - id: update-python-headers
            name: Update Python script headers
            entry: .tools/scripts/quality/update_header.py
            language: python
            types: [python]
            additional_dependencies: [jinja2]

    - repo: https://github.com/asottile/pyupgrade
      rev: v3.20.0
      hooks:
          - id: pyupgrade
