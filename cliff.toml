# cliff.toml

# --- Changelog Configuration --------------------------------------------------
[changelog]

# --- Header ------------------------------
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

# --- Body --------------------------------
# Body template uses Tera templating syntax
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
    ### {{ group | upper_first }}
    {% for commit in commits %}\
        - {% if commit.scope %}(**{{ commit.scope }}**){% endif %} {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ repo_url }}/commit/{{ commit.id }}))\
    {% endfor %}\
{% endfor %}\n
"""

# --- Footer ------------------------------
footer = """
"""

# --- General Settings --------------------
trim = true                     # Remove leading/trailing whitespace from the body and footer

# --- git Processing Configuration ---------------------------------------------
[git]                           # This section configures how git-cliff processes the git history
conventional_commits = true     # Use Conventional Commits specifications
filter_unconventional = true    # Ignore commits that do not follow the conventional commit format
repo_url = "https://github.com/bsamiee/Parametric_Arsenal"

commit_parsers = [              # This section maps commit types from Conventional Commits to changelog groups
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^docs", group = "📖 Documentation" },
    { message = "^perf", group = "🚀 Performance" },
    { message = "^refactor", group = "🔨 Refactoring" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "✅ Testing" },
    { message = "^build", group = "📦 Build System" },
    { message = "^ci", group = "🤖 Continuous Integration" },
    { message = "^revert", group = "⏪ Reverts" },
]