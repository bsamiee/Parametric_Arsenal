# cliff.toml
# Configuration for git-cliff changelog generator
# https://git-cliff.org/docs/configuration

# --- Changelog Configuration --------------------------------------------------
[changelog]

# --- Header ------------------------------
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

# --- Body --------------------------------
# Body template uses Tera templating syntax
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [Unreleased]
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}{% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/bsamiee/Parametric_Arsenal/commit/{{ commit.id }}))
{%- if commit.breaking_description %}
  - {{ commit.breaking_description }}
{%- endif %}
{% endfor %}
{% endfor %}
"""

# --- Footer ------------------------------
footer = """
<!-- generated by git-cliff -->
"""

# --- General Settings --------------------
trim = true
render_always = true

# --- Git Processing Configuration ---------------------------------------------
[git]
# Process conventional commits
conventional_commits = true
# Filter out non-conventional commits
filter_unconventional = true
# Split commits by lines (useful for multiple changes in one commit)
split_commits = false
# Protect breaking changes from being filtered
protect_breaking_commits = true
# Sort commits
sort_commits = "newest"
# Use topological order
topo_order = false
# Tag pattern for releases
tag_pattern = "v[0-9]*"

# Commit preprocessors - manipulate commit messages before parsing
commit_preprocessors = [
    # Ensure BREAKING CHANGE: is uppercase (case insensitive match)
    { pattern = '(?i)breaking change:', replace = "BREAKING CHANGE:" },
]

# Commit parsers - this section maps commit types to changelog groups
# IMPORTANT: Order matters! More specific patterns must come first
commit_parsers = [
    # Skip commits - these won't appear in changelog
    { message = "^Merge", skip = true },
    { message = "^bump:", skip = true },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(changelog\\):", skip = true },
    { message = "^docs: enhance changelog", skip = true },

    # Breaking changes MUST be parsed first (most specific)
    # Format: <type>!: <description> OR body contains BREAKING CHANGE:
    { message = "^feat!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^fix!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^refactor!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^perf!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^build!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^ci!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^docs!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^style!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^test!(\\(.+\\))?:", group = "Breaking Changes" },
    { message = "^chore!(\\(.+\\))?:", group = "Breaking Changes" },
    { body = "BREAKING CHANGE:", group = "Breaking Changes" },

    # Standard conventional commit types (without breaking indicator)
    { message = "^feat(\\(.+\\))?:", group = "Features" },
    { message = "^fix(\\(.+\\))?:", group = "Bug Fixes" },
    { message = "^perf(\\(.+\\))?:", group = "Performance" },
    { message = "^refactor(\\(.+\\))?:", group = "Refactor" },
    { message = "^style(\\(.+\\))?:", group = "Styling" },
    { message = "^docs(\\(.+\\))?:", group = "Documentation" },
    { message = "^test(\\(.+\\))?:", group = "Tests" },
    { message = "^build(\\(.+\\))?:", group = "Build System" },
    { message = "^ci(\\(.+\\))?:", group = "Continuous Integration" },
    { message = "^chore(\\(.+\\))?:", group = "Miscellaneous" },
    { message = "^revert(\\(.+\\))?:", group = "Reverts" },

    # Catch any other conventional format we might have missed
    { message = "^\\w+(\\(.+\\))?:", group = "Other" },
]

# Link parsers - extract issue and PR links
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/bsamiee/Parametric_Arsenal/issues/$1" },
    { pattern = "RFC(\\d+)", href = "https://github.com/bsamiee/Parametric_Arsenal/discussions/$1" },
]

[git.remote]
name = "origin"
url = "https://github.com/bsamiee/Parametric_Arsenal"
