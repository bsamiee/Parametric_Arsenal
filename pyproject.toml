# --- Rhino/Grasshopper ----------------------
rhino3dm = { version = "^8.17.0", optional = true }
rhinoinside = { version = "^0.8.2", optional = true }

# -------------------------------------------------------------------------------
# Dependency Groups
# -------------------------------------------------------------------------------

# --- Core development utilities ------------------------------------------------
[tool.poetry.group.dev.dependencies]

# Management
commitizen = ">=4.8.2"
jinja2 = "^3.1.6"
git-cliff = ">=2.9.1"
nox = "^2025.5.1"
python-semantic-release = ">=10.0.2"
pre-commit = "^4.2.0"

# Linting & Formatting
jsonlint = "^0.1"
mdformat = "^0.7.22"
mdformat-frontmatter = "^2.0.8"
ruff = "^0.11.13"
shellcheck-py = "^0.10.0.1"
toml-sort = ">=0.24.2"
yamllint = ">=1.37.1"
docformatter = "^1.7.7"

# Static analysis helpers kept here for convenience
radon = ">=6.0.1"
vulture = ">=2.14"

# --- Type-checking only --------------------------------------------------------
[tool.poetry.group.type.dependencies]
mypy = "^1.16.0"
mypy-extensions = ">=1.1.0"

# --- Test suite & profiling ----------------------------------------------------
[tool.poetry.group.test.dependencies]
Faker = ">=37.3.0"
coverage = ">=7.8.2"
hypothesis = ">=6.135.1"
line-profiler = ">=4.2.0"
memory-profiler = ">=0.61.0"
pyinstrument = ">=5.0.2"
pytest = "^8.4.0"
pytest-cov = ">=6.1.1"
pytest-json-report = ">=1.5.0"
pytest-mock = ">=3.14.1"

# --- Documentation toolchain ---------------------------------------------------
[tool.poetry.group.docs.dependencies]
mkdocs = ">=1.6.1"
mkdocs-material = ">=9.6.14"
sphinx = "^8.2.3"
weasyprint = ">=65.1"

# --- Tool Configurations ------------------------------------------------------

# --- ruff Configuration ------------------
[tool.ruff]
cache-dir = ".cache/ruff"
exclude = ["node_modules", ".venv", ".cache", "package-lock.json"]
line-length = 120
src = ["."]
target-version = "py313"

[tool.ruff.lint]
extend-ignore = [
  "D203",
  "D205", # Ignore blank line required between summary and description
  "D212",
  "D400",
  "D415",
  "D413",
  "D405",
  "D406",
  "D407",
  "D408",
  "D409",
  "D410",
  "D411",
  "D414",
  "D416",
]
extend-select = [
  "A",
  "B",
  "D",
  "E",
  "F",
  "N",
  "S",
  "G",
  "I",
  "Q",
  "W",
  "C4",
  "TC",
  "TD",
  "UP",
  "PL",
  "PT",
  "AIR",
  "ERA",
  "FAST",
  "ANN",
  "ASYNC",
  "FBT",
  "BLE",
  "COM",
  "DTZ",
  "EM",
  "EXE",
  "FA",
  "INT",
  "ISC",
  "ICN",
  "LOG",
  "PIE",
  "T20",
  "PYI",
  "RET",
  "SLF",
  "SIM",
  "SLOT",
  "TID",
  "ARG",
  "PTH",
  "FLY",
  "PERF",
  "DOC",
  "PGH",
  "PLC",
  "PLE",
  "PLR",
  "PLW",
  "FURB",
  "TRY",
  "RUF",
]
fixable = ["ALL"] #aggressive autofixing

[tool.ruff.lint.pylint]
allow-magic-value-types = ["int", "str"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false
known-first-party = ["mzn", "mzn_cli"]
lines-after-imports = 2

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true
mypy-init-return = true
suppress-none-returning = true

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = true
mark-parentheses = true

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"] # Ignore `assert` usage in tests

# --- docformatter Configuration ----------
[tool.docformatter]
wrap-summaries = 120
wrap-descriptions = 120
pre-summary-newline = true
make-summary-multi-line = false
blank = true
in-place = true
recursive = true
black = false
force-wrap = true

# --- mypy Configuration ------------------
[tool.mypy]
cache_dir = ".cache/mypy"
exclude = '(^node_modules/|^\\.venv/|^\\.cache/|^package-lock\\.json$)'
explicit_package_bases = true
mypy_path = [".", "libs"]
namespace_packages = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin", "mypy_extensions"]
python_version = "3.13"
strict = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]] # For third-party libraries that have NO type stubs available
ignore_missing_imports = true
module = [
  "libs.*",
  "boltons.*",
  "cloudscraper.*",
  "fabric.*",
  "icecream.*",
  "pudb.*",
  "rhino3dm.*",
  "rhinoinside.*",
  "sh.*",
  "thefuzz.*",
]

# --- radon Configuration -----------------
[tool.radon]
mi = { min = "A" }

# --- coverage Configuration --------------
[tool.coverage.run]
branch = true
data_file = ".cache/coverage"
omit = [
  "node_modules/*",
  ".venv/*",
  "package-lock.json",
  ".cache/*",
  "tests/*",
  "*/__main__.py",
]
source = ["libs/mzn", "libs/mzn_cli"] # Source code to measure coverage for

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "def __repr__",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "pass",
  "raise ImportError",
]
fail_under = 85
show_missing = true

[tool.coverage.html]
directory = ".cache/coverage/html" # HTML report output directory

# --- pytest Configuration ----------------
[tool.pytest.ini_options]
addopts = """
    --import-mode=importlib
    -ra
    --cov=libs
    --cov-report=term-missing
    --cov-fail-under=80
    --no-cov-on-fail
    """
cache_dir = ".cache/pytest"
markers = ["asyncio"]
minversion = "8.0"
norecursedirs = ["node_modules", ".venv", "package-lock.json", ".cache"]
python_classes = "Test*"
python_files = "test_*.py"
python_functions = "test_*"
pythonpath = ["."]
testpaths = ["tests", "libs/mzn", "libs/mzn_cli"]

# --- mdformat Configuration --------------
[tool.mdformat]
number = true
wrap = 120

# --- tomlsort Configuration --------------
[tool.tomlsort]
multiline-style = "preserve"
sort-order = "case-sensitive"

# --- yamllint Configuration --------------
[tool.yamllint]
rules.line-length.max = 120
strict = true

# --- Publishing Configurations ------------------------------------------------

# --- Commitizen Configuration ------------
[tool.commitizen] # The sole purpose of this tool in the workflow is to provide an interactive
name = "cz_conventional_commits" # prompt for creating commits that follow the Conventional Commits specification

# --- Python-Semtanic Configuration -------
[tool.semantic_release]
branch = "master"
major_on_zero = true # Set this to true so a 'feat!' or 'BREAKING CHANGE' on v0.5.0 becomes v1.0.0
sources = [ # Specifies which files to update with the new version number
  { path = "pyproject.toml", search = "version = \"{version}\"" },
]
tag_format = "v{version}" # Use the tag_format from commitizen for consistency

[tool.semantic_release.commit_parser_options]
breaking_description = "BREAKING CHANGE"
major_tags = ["feat!", "breaking"]
minor_tags = ["feat", "feature"]
patch_tags = [
  "fix",
  "perf",
  "docs",
  "style",
  "refactor",
  "build",
  "ci",
  "revert",
]

[tool.semantic_release.hooks] # Defines the commands to run at different stages of the release process
before_publish = [ # Runs before the release is published
  "git-cliff --tag ${next_version} --output CHANGELOG.md",
]

[tool.semantic_release.changelog] # Defines how the changelog is generated
changelog_file = "CHANGELOG.md" # Points to the changelog file made via git-cliff
check_consistency = true        # This setting just checks if the changelog file was changed, which our hook does

[tool.semantic_release.publish] # Defines what happens during the 'publish' step
build_command = "poetry build" # Command to build package distributions (sdist and wheel)
dist_glob_patterns = [
  "dist/*",
] # Command to build package distributions (sdist and wheel)
upload_to_pypi = false # Do NOT upload to PyPI by default
upload_to_release = true # Uploads assets to a GitHub release
