redis = {extras = ["hiredis"], version = "^6.2.0"}
rhino3dm = {optional = true, version = "^8.17.0"}
rhinoinside = {optional = true, version = "^0.8.2"}
rich = "^14.0.0"
ruamel-yaml = "^0.18.13"
scipy = {optional = true, version = "^1.15.3"}
scrapy = {optional = true, version = "^2.13.1"}
