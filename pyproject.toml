# --- Metadata -----------------------------------------------------------------

# Title           : pyproject.toml
# Author          : Bardia Samiee
# Project         : Parametric Arsenal

# --- Build System -------------------------------------------------------------
[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core"]

[project]
name = "parametric_arsenal"
version = "1.0.1"
description = "Architectural/Parametric monorepo"
readme = "README.md"
license = "MIT"
authors = [{ name = "Bardia Samiee", email = "b.samiee93@gmail.com" }]
keywords = ["rhino", "grasshopper", "automation"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3 :: Only",
]
requires-python = ">=3.13,<3.14"
dynamic = ["dependencies"]

[[tool.poetry.packages]]
include = "libs/mzn"

[[tool.poetry.packages]]
include = "libs/mzn_cli"

[project.scripts]
pa = "mzn_cli.main:cli"

# --- Optional Dependencies ----------------------------------------------------
[project.optional-dependencies]
rhinogh = ["rhino3dm", "rhinoinside"]
viz = ["altair", "matplotlib", "plotly", "qrcode", "seaborn"]
autoscape = ["cloudscraper", "playwright", "pyautogui", "scrapy"]
datascience = [
  "dask",
  "h5py",
  "networkx",
  "numpy",
  "pandas",
  "polars",
  "pyarrow",
  "pyspark",
  "scipy",
  "sympy",
  "uncertainties",
  "xarray",
  "geopandas",
]
webnet = [
  "fabric",
  "fastapi",
  "httpx",
  "paramiko",
  "pyserial",
  "python-multipart",
  "strawberry-graphql",
  "uvicorn",
  "websockets",
]

# --- Runtime Dependencies -----------------------------------------------------
[tool.poetry.dependencies]
python = ">=3.13,<3.14"

# --- Core Utilities -------------------------
boltons = ">=25.0.0"
dynaconf = "^3.2.11"
pydantic = { extras = ["email"], version = "^2.11.5" }
