# --- Metadata -----------------------------------------------------------------

# Title           : pyproject.toml
# Author          : Bardia Samiee
# Project         : Parametric Arsenal

# --- Build System -------------------------------------------------------------
[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core"]

[project]
name = "parametric_arsenal"
version = "0.1.0"
description = "Architectural/Parametric monorepo"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Bardia Samiee", email = "b.samiee93@gmail.com" }]
keywords = ["rhino", "grasshopper", "automation"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3 :: Only",
]
requires-python = ">=3.13,<3.14"
dynamic = ["dependencies"]

[[tool.poetry.packages]]
include = "libs/mzn"

[[tool.poetry.packages]]
include = "libs/mzn_cli"

[project.scripts]
pa = "mzn_cli.main:cli"

# --- Option Dependencies ------------------------------------------------------
[project.optional-dependencies]
rhinogh = ["rhino3dm", "rhinoinside"]

# --- Runtime Dependencies -----------------------------------------------------
[tool.poetry.dependencies]
python = ">=3.13,<3.14"

# --- Core Utilities -------------------------
boltons = ">=25.0.0"
dynaconf = "^3.2.11"
pydantic = { extras = ["email"], version = "^2.11.5" }
pydantic-settings = "^2.9.1"
python-dateutil = "^2.9.0.post0"
toolz = "^1.0.0"

# --- Logging & Metrics ----------------------
prometheus-client = "^0.22.1"
structlog = "^25.4.0"

# --- Debugging ------------------------------
icecream = "^2.1.4"
ipdb = "^0.13.13"
pudb = "^2025.1"

# --- CLI & TUI ------------------------------
prompt_toolkit = "^3.0.51"
rich = "^14.0.0"
tabulate = "^0.9.0"
textual = "^3.3.0"
tqdm = "^4.67.1"
typer = ">=0.16.0"

# --- Concurrency & Tasking ------------------
anyio = "^4.9.0"
apscheduler = "^3.11.0"
celery = "^5.5.3"
psutil = ">=7.0.0"
sh = ">=2.2.2"
tenacity = "^9.1.2"
watchdog = "^6.0.0"

# --- Caching --------------------------------
aiocache = "^0.12.3"
cachetools = "^6.0.0"
diskcache = "^5.6.3"
dogpile-cache = "^1.1.8"
redis = { extras = ["hiredis"], version = "^6.2.0" }

# --- Data Handling, Serialization & I/O -----
beautifulsoup4 = ">=4.13.4"
lxml = ">=5.4.0"
openpyxl = "^3.1.5"
orjson = "^3.10.18"
pillow = "^11.2.1"
pymupdf = ">=1.26.0"
pypdf = "^5.6.0"
python-docx = ">=1.1.2"
python-magic = "^0.4.27"
python-pptx = ">=1.0.2"
ruamel-yaml = "^0.18.13"
thefuzz = { extras = ["speedup"], version = "^0.22.1" }
tomlkit = "^0.13.3"

# --- Database & Data Stores -----------------
Alembic = ">=1.16.1"
DVC = ">=3.60.0"
DuckDB = ">=1.3.0"
SQLAlchemy = ">=2.0.41"
SQLModel = ">=0.0.24"
asyncpg = ">=0.30.0"
jsonschema = ">=4.24.0"

# --- Security & Encryption ------------------
argon2-cffi = "^25.1.0"
cryptography = "^45.0.3"
passlib = "^1.7.4"
python-jose = "^3.5.0"

# --- Data & Science -------------------------
dask = "^2025.5.1"
geopandas = "^1.1.0"
h5py = "^3.14.0"
networkx = "^3.5"
numpy = "^2.2.6"
pandas = "^2.3.0"
polars = "^1.30.0"
pyarrow = "^20.0.0"
pyspark = "^4.0.0"
scipy = "^1.15.3"
sympy = ">=1.14.0"
uncertainties = ">=3.2.3"
xarray = "^2025.4.0"

# --- Visualization --------------------------
altair = "^5.5.0"
matplotlib = "^3.10.3"
plotly = "^6.1.2"
qrcode = ">=8.2"
seaborn = ">=0.13.2"

# --- Web / Networking -----------------------
fabric = "^3.2.2"
fastapi = "^0.115.12"
httpx = ">=0.28.1"
