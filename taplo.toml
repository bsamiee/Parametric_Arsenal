# Full option reference: https://taplo.tamasfe.dev/configuration/formatter-options.html

[formatting]
# ── basic layout ───────────────────────────────────────
indent_string         = "  "     # two-space indent
indent_entries        = true     # indent entry lines (tables stay flush)
align_entries         = true     # vertical "=" alignment
reorder_keys          = true     # alphabetize keys that have no blank line separators
allowed_blank_lines   = 1        # collapse >1 consecutive blank lines

# ── arrays & inline tables ─────────────────────────────
array_trailing_comma  = true     # keep trailing comma on multiline arrays
compact_arrays        = false    # keep padding space inside [ 1, 2 ]
compact_inline_tables = false    # keep spaces in { key = "v" }
inline_table_expand   = true     # expand nested arrays/objs inside inline tables

# ── width / endings ───────────────────────────────────
column_width          = 120      # soft wrap target for auto-expansion
trailing_newline      = true     # ensure \n at EOF (default)
